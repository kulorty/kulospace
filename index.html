<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <title>作业展示</title>
    <link rel="icon" href="picture/touxiang.ico" type="image/x-icon" />
    <style>
        body {
            background-image: url("picture/background.jpg");
            background-size: 100%;
            background-attachment: fixed
        }

        .content {
            height: 100%;
            width: 807px;
            margin: 0 auto;
            padding-top: 80px;
            display: flex;
            position: relative;
            z-index: 3;
        }

        .pgm {
            width: 250px;
            height: 155px;
            display: inline-block;
            border: 1px black solid;
            border-radius: 10px;
            text-align: center;
            font-size: 16px;
            padding: 5px;
            margin: 2px;
        }

        a {
            cursor: pointer;
            text-decoration: none;
            color: black;
        }

        .suo {
            width: 250px;
            height: 130px;
        }

        .suo:hover {
            transform: scale(1.1);
            transition: 0.5s;
        }

        p {
            position: relative;
            display: inline-block;
            padding-bottom: 2px;
            margin: 0;
        }

        p::before {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            height: 2px;
            width: 0;
            background-color: black;
            transition: all 0.3s ease-in-out;
        }

        p:hover::before {
            width: 0;
            right: 0;
        }

        p::after {
            content: "";
            position: absolute;
            right: 0;
            bottom: 0;
            height: 2px;
            width: 0;
            background-color: black;
            transition: all 0.3s ease-in-out;
        }

        p:hover::after {
            width: 100%;
            left: 0;
        }

        .title {
            margin: 0 auto;
            display: flex;
            padding-top: 30px;
            padding-bottom: 20px;
        }

        .bookbg {
            width: 1050px;
            height: 900px;
            z-index: -3;
            position: absolute;
        }

        .main {
            width: 1050px;
            height: 900px;
            margin: 0 auto;
            display: flex;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background-color: #7EAACC;
            opacity: 1;
            visibility: visible;
            transition: opacity 1.8s, visibility 1.8s, transform 1.8s;
        }

        #loading.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8);
        }
    </style>
</head>

<body>
    <div id="loading">
        <img src="picture/loading.gif" style="width: 480px;height: 480px;margin:50px auto;display: flex;">
        <img src="picture/start.png" style="margin: -90px auto;display: flex;">
    </div>
    <img class="title" src="picture/title.png">
    <div class="main">
        <img class="bookbg" src="picture/bookbg.png">
        <div class="content">
            <div class="pgm">
                <a href="详情/第一次作业.html" target="_blank">
                    <div style="width: 250px;height: 130px;overflow: hidden;">
                        <img class="suo" src="picture/suo1.png">
                    </div>
                    <p>第一次作业</p>
                </a>
            </div>
            <div class="pgm">
                <a href="详情/第二课堂项目/index.html" target="_blank">
                    <div style="width: 250px;height: 130px;overflow: hidden;">
                        <img class="suo" src="picture/suo2.png">
                    </div>
                    <p>第二课堂项目</p>
                </a>
            </div>
            <div class="pgm">
                <a href="详情/第二次作业.html" target="_blank">
                    <div style="width: 250px;height: 130px;overflow: hidden;">
                        <img class="suo" src="picture/suo1.png">
                    </div>
                    <p>第二次作业</p>
                </a>
            </div>
        </div>
    </div>

    <audio preload loop id="vd">
        <source src="otherside.mp3" type="audio/mpeg">
    </audio>
    <script type="text/javascript">
        window.onload = function () {
            setInterval("toggleSound()", 10);
        }

        function toggleSound() {
            var music = document.getElementById("vd");//获取ID  

            if (music.paused) { //判读是否播放  
                music.paused = false;
                music.play(); //没有就播放 
            }
        }
        document.getElementById("loading").addEventListener("click", function () {
            this.classList.add("hidden");
        });
    </script>

</body>

</html>
