		//使用jQuery方式
		//添加一行
		function addRow() {
			var fRow = $("#row3");
			var newRow = $("<tr></tr>"); //创建行节点
			var col1 = $("<td></td>").html("幸福从天而降"); //创建单元格节点并为其添加文本
			var col2 = $("<td></td>").html("&yen;18.50").attr("align", "center");
			newRow.append(col1).append(col2);
			$("#row2").after(newRow); //把行节点添加到指定行的下面
		}

		//删除第二行
		function updateRow() {
			var uRow = $("#row1");
			//标题行设置为字体加粗、文本居中显示，背景颜色为灰色
			uRow.css({ "font-weight": "bold", "text-align": "center", "background-color": "#cccccc" });
		}
		//修改标题样式
		function delRow() {
			var dRow = $("tr"); //访问被删除的行
			if (dRow[2] != null) {
				$(dRow[2]).remove(); //删除行
			}
		}
		//复制最后一行
		function copyRow() {
			var oldRow = $("#row3"); //访问复制的行
			var newRow = oldRow.clone(); //复制指定的行及子节点
			$("#myTable").append(newRow); //在指定节点的末尾添加行
		}
