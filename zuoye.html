<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 219971320刘桂宏 -->
</head>
<body>
    <script type="text/javascript">
        //三角形
        var i,j;
        for(i=1;i<=5;i++){
            for(j=1;j<=5-i;j++){
                document.write("&nbsp;");
            }
            for(j=1;j<=i;j++){
                document.write("* ");
            }
            document.write("<br>");
        }
        //平行四边形
        for(i=1;i<=5;i++){
            for(j=1;j<=5-i;j++){
                document.write("&nbsp;");
            }
            for(j=1;j<=5;j++){
                document.write("* ");
            }
            document.write("<br>");
        }
        //菱形
        for(i=1;i<=3;i++){
            for(j=1;j<=3-i;j++){
                document.write("&nbsp; ");

            }
            for(j=1;j<=2*i-1;j++){
                document.write("*  ");
            }
            document.write("<br>");
        }
        for(i=1;i<=2;i++){
            for(j=1;j<=i;j++){
                document.write("&nbsp; ");
            }
            for(j=1;j<=5-2*i;j++){
                document.write("*  ");
            }
            document.write("<br>");
        }
    </script>
</body>
</html>
